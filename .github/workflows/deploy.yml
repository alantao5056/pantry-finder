name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to manually trigger the deployment from GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Using standard LTS Node.js

      - name: Install Dependencies and Build
        working-directory: .
        run: |
          npm install
          npm run build

      - name: Copy files to Ubuntu server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Copy the built output, package.json, and lockfile
          source: "package.json,package-lock.json,apps/api/dist,apps/api/package.json,apps/api/package-lock.json,apps/web/.output,apps/web/package.json,apps/web/package-lock.json"
          target: ${{ secrets.REMOTE_TARGET }}

      - name: Install Production Dependencies & Restart REST API and Web App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.REMOTE_TARGET }}/apps/api

            cat > .env.production << 'EOF'
            FIREBASE_SERVICE_ACCOUNT_JSON=${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
            EOF

            cd ${{ secrets.REMOTE_TARGET }}/apps/web

            cat > .env.production << 'EOF'
            NUXT_PUBLIC_API_BASE=${{ secrets.NUXT_PUBLIC_API_BASE }}
            EOF
            
            # Install only production dependencies on the server
            cd ${{ secrets.REMOTE_TARGET }}
            npm install --omit=dev

            # sudo systemctl restart pantry-api
            # sudo systemctl restart pantry-web
            
            echo "Deployment files synced and dependencies installed."
